name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:                      
  FRONTEND_IMAGE_NAME: nodejs-frontend       # Change to your ECR repo name
  BACKEND_IMAGE_NAME: nodejsbackend

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Get latest image tag
      id: get_tag
      run: |
        LATEST=$(curl -s "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}/tags/?ordering=last_updated" \
            | jq -r '.results[].name' \
            | grep -E '^v[0-9]+$' \
            | sort -V | tail -1)

            if [ -z "$LATEST" ]; then
              NEXT_TAG="v1"
            else
              VERSION=${LATEST#v}
              NEXT_TAG="v$((VERSION + 1))"
            fi

            echo "next_tag=$NEXT_TAG" >> $GITHUB_OUTPUT

    - name: Build and push
      uses: docker/build-push-action@v5


